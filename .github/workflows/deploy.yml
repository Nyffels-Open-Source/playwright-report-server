name: Release to docker
on:
  workflow_dispatch:
  push:
    branches: ['main']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
    steps:
      - name: Set Calver Version
        uses: Nyffels-IT/github-actions-calver-version-generator@v1.0.1

      - name: Current verion
        run: 'echo Version: ${{ env.VERSION }}'

  deploy-qa:
    runs-on: ubuntu-latest
    needs: [get_version]
    steps:
      - name: Copy Repo Files
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: /infra/Dockerfile
          pull: true
          push: true
          sbom: true
          provenance: mode=max
          build-args: |
            RUNNER_VERSION=${{ needs.get_runner_version.outputs.runner_version }}
          tags: |
            nyffels/playwright-report-server:qa-${{ needs.get_version.outputs.version }}

  scan-trivy:
    name: "Security: Trivy"
    runs-on: ubuntu-latest
    needs: [deploy-qa, get_version]
    env:
      IMAGE_REF: nyffels/playwright-report-server:qa-${{ needs.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull image
        run: docker pull $IMAGE_REF

      - name: Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

  scan-trivy-non-blocking:
    name: "Security: Trivy (non-blocking)"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [deploy-qa, get_version]
    env:
      IMAGE_REF: nyffels/playwright-report-server:qa-${{ needs.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull image
        run: docker pull $IMAGE_REF

      - name: Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: LOW,MEDIUM
          exit-code: "1"
          trivyignores: .trivyignore

  scan-scout:
    name: "Security: Docker Scout"
    runs-on: ubuntu-latest
    needs: [deploy-qa, get_version]
    env:
      IMAGE_REF: nyffels/playwright-report-server:qa-${{ needs.get_version.outputs.version }}

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull image
        run: docker pull $IMAGE_REF

      - name: Install Docker Scout
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh
          docker scout version

      - name: Scan
        shell: bash
        run: |
          set -euo pipefail

          docker scout cves "$IMAGE_REF" --only-severity critical,high --format sarif > scout.sarif || true

          ALLOWED_JSON="$(printf '%s\n' "${ALLOWED_CVES[@]}" | jq -R . | jq -s .)"
          BLOCKING_COUNT="$(jq --argjson allowed "$ALLOWED_JSON" '[.runs[].results[]? | select((.ruleId as $id | $allowed | index($id)) | not)] | length' scout.sarif)"

          if [[ "$BLOCKING_COUNT" -gt 0 ]]; then
            echo "Blocking critical/high CVEs found (excluding temporary allowlist):"
            jq -r --argjson allowed "$ALLOWED_JSON" '.runs[].results[]? | select((.ruleId as $id | $allowed | index($id)) | not) | .ruleId' scout.sarif | sort -u
            exit 1
          fi

          echo "No blocking critical/high CVEs outside temporary allowlist."

  scan-scout-non-blocking:
    name: "Security: Docker Scout (non-blocking)"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [deploy-qa, get_version]
    env:
      IMAGE_REF: nyffels/playwright-report-server:qa-${{ needs.get_version.outputs.version }}
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull image
        run: docker pull $IMAGE_REF

      - name: Install Docker Scout
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh
          docker scout version

      - name: Scan
        shell: bash
        run: |
          set -euo pipefail
          docker scout cves "$IMAGE_REF" --only-severity medium,low --format sarif > scout-nonblocking.sarif || true

      - name: Non-blocking gate (soft-fail)
        shell: bash
        run: |
          set -euo pipefail
          NON_BLOCKING_COUNT="$(jq '[.runs[].results[]?] | length' scout-nonblocking.sarif)"
          echo "Docker Scout non-blocking findings count: ${NON_BLOCKING_COUNT}"
          if [[ "$NON_BLOCKING_COUNT" -gt 0 ]]; then
            echo "Docker Scout non-blocking findings detected: ${NON_BLOCKING_COUNT}"
            echo "| CVE | Summary |"
            echo "|---|---|"
            jq -r '
              .runs[].results[]?
              | [(.ruleId // "n/a"), ((.message.text // "n/a") | gsub("[\r\n]+"; " ") | gsub("[|]"; "/"))]
              | @tsv
            ' scout-nonblocking.sarif \
              | sort -u \
              | while IFS=$'\t' read -r cve summary; do
                  printf '| %s | %s |\n' "$cve" "$summary"
                done
            exit 1
          else
            echo "No non-blocking Docker Scout findings."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [get_version, scan-trivy, scan-scout]
    steps:
      - name: Copy Repo Files
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Promote QA digest to release tags
        shell: bash
        run: |
          set -euo pipefail
          QA_IMAGE="nyffels/playwright-report-server:qa-${{ needs.get_version.outputs.version }}"
          RELEASE_IMAGE="nyffels/playwright-report-server:${{ needs.get_version.outputs.version }}"
          LATEST_IMAGE="nyffels/playwright-report-server:latest"

          DIGEST="$(docker buildx imagetools inspect "$QA_IMAGE" | awk '/^Digest:/ {print $2; exit}')"
          if [[ -z "$DIGEST" ]]; then
            echo "Could not resolve digest for $QA_IMAGE"
            exit 1
          fi

          docker buildx imagetools create \
            --tag "$RELEASE_IMAGE" \
            --tag "$LATEST_IMAGE" \
            "nyffels/playwright-report-server@$DIGEST"
